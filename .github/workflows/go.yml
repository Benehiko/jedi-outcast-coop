name: go

# Lint, build (all target platforms), and test the jk2coop tooling binary that
# replaces the tools/*.sh scripts. The `go` job runs on the host toolchain with
# no game data or submodule; the `e2e` job additionally checks out the OpenJK
# submodule and drives the built binary (jk2coop patches apply) against it.

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: lint + build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Lint (golangci-lint run)
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Format check (gofumpt + goimports)
        run: |
          out="$(golangci-lint fmt --diff)"
          if [ -n "$out" ]; then
            echo "code is not formatted; run 'make fmt' and re-commit:" >&2
            echo "$out" >&2
            exit 1
          fi

      - name: Build (host)
        run: go build -mod=vendor ./...

      - name: Cross-compile (darwin, windows)
        run: |
          GOOS=darwin  GOARCH=amd64 go build -mod=vendor ./...
          GOOS=darwin  GOARCH=arm64 go build -mod=vendor ./...
          GOOS=windows GOARCH=amd64 go build -mod=vendor ./...

      - name: Test (race)
        run: go test -mod=vendor -race ./...

  e2e:
    name: e2e (patches apply via jk2coop)
    runs-on: ubuntu-latest
    steps:
      # The e2e tests drive the built binary against the OpenJK submodule, so it
      # must be checked out. They reset the submodule around each run.
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.5'
          cache: true

      - name: Run e2e tests
        run: make e2e
